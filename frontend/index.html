<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LLM Chat</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container">

    <aside class="sidebar">

        <button id="new-chat">
            New chat
        </button>

        <div id="chat-list"></div>

    </aside>

    <main class="chat">

        <div id="messages"></div>

        <div class="input">

            <textarea id="message"></textarea>

            <button id="send">
                Send
            </button>

        </div>

    </main>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>

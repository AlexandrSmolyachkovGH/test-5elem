services:
  backend:
    build: ./backend
    container_name: backend
    volumes:
      - ./backend:/backend
    env_file: ".env"
    ports:
      - "8000:8000"
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload

  frontend:
    build: ./frontend
    ports:
      - "80:80"